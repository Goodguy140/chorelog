<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var t = localStorage.getItem('chorelog-theme');
      if (t !== 'light' && t !== 'dark' && t !== 'system') t = 'system';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Track household chores and monthly contributions.">
  <meta name="theme-color" id="metaThemeColor" content="#1a1a18">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chorelog">
  <meta name="application-name" content="Chorelog">
  <meta name="msapplication-TileColor" content="#1a1a18">
  <title>Chore Tracker</title>
  <link rel="icon" href="/icons/app-icon.svg" type="image/svg+xml" sizes="any">
  <link rel="shortcut icon" href="/icons/app-icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="apple-touch-icon" href="/icons/app-icon.svg">
  <link rel="stylesheet" href="/css/chore-tracker.css">
</head>

<body>
  <div class="wrap">
    <div class="top-bar">
      <span class="title">Chore tracker</span>
      <div class="top-bar-actions">
        <button type="button" class="btn-settings" id="btnSettings" aria-haspopup="dialog">Settings</button>
        <div class="month-tabs" id="monthTabs"></div>
      </div>
    </div>
    <p id="loadError" class="empty" style="display:none;margin-bottom:12px;color:#E24B4A;"></p>

    <div class="stat-grid" id="statsGrid"></div>

    <div class="section">
      <p class="section-title">Contributions this month</p>
      <div id="barsArea"></div>
    </div>

    <div class="section">
      <p class="section-title">Log a chore</p>
      <div class="add-form">
        <div class="field field-date"><label for="inDate">Date</label>
          <div class="date-input-shell"><input type="date" id="inDate" autocomplete="off"></div>
        </div>
        <div class="field"><label>Chore</label><input type="text" id="inChore" placeholder="e.g. Dishes; Swept kitchen">
        </div>
        <div class="field"><label>Person</label>
          <select id="inPerson"></select>
        </div>
        <button class="btn-add" onclick="addEntry()">+ Add</button>
      </div>
    </div>

    <div class="section">
      <p class="section-title">Log for <span id="logMonthLabel"></span></p>
      <div class="log-list" id="logList"></div>
    </div>

    <div class="section">
      <p class="section-title">Month-over-month</p>
      <div class="mom-grid" id="momGrid"></div>
    </div>
  </div>

  <dialog class="settings-dialog" id="settingsDialog" aria-labelledby="settingsTitle">
    <div class="settings-inner">
      <div class="settings-header">
        <h2 id="settingsTitle">Settings</h2>
        <button type="button" class="settings-close" id="settingsClose" aria-label="Close">&times;</button>
      </div>

      <div>
        <p class="settings-block-title">Appearance</p>
        <div class="theme-options" id="themeOptions">
          <label><input type="radio" name="theme" value="system"> System</label>
          <label><input type="radio" name="theme" value="light"> Light</label>
          <label><input type="radio" name="theme" value="dark"> Dark</label>
        </div>
      </div>

      <div>
        <p class="settings-block-title">People</p>
        <ul class="people-list" id="peopleList"></ul>
        <div class="add-person-row">
          <input type="text" id="newPersonName" placeholder="Name" maxlength="80" autocomplete="off">
          <button type="button" class="btn-secondary" id="btnAddPerson">Add</button>
        </div>
      </div>

      <div>
        <p class="settings-block-title">Data</p>
        <div class="settings-actions">
          <button type="button" class="btn-secondary" id="btnExport">Export JSON</button>
          <label class="btn-secondary" style="cursor:pointer;display:inline-block;">
            Import JSON
            <input type="file" id="importFile" accept="application/json,.json" hidden>
          </label>
        </div>
        <p class="settings-hint" style="margin-top:8px;">Import can <strong>replace</strong> everything or <strong>merge</strong> with a prompt. Export includes people and all chore entries.</p>
      </div>
    </div>
  </dialog>

  <script src="/js/chore-tracker.js" defer></script>
</body>

</html>
