name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test

      # About page: pass GITHUB_SHA, GITHUB_REPOSITORY, GITHUB_RUN_ID, etc. into your deploy
      # environment or container so the app can show them under Settings → About.
      - name: Echo GitHub build metadata (for deploy wiring)
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}"
          echo "GITHUB_REF=${GITHUB_REF}"
